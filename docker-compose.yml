services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import os,time; f='/tmp/heartbeat';
          exit(0 if os.path.exists(f) and time.time()-os.path.getmtime(f)<60 else 1)
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  bot_data:
  bot_logs:
